<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardwave DAW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #444444;
        color: #C0C0C0;
        font-family: 'Segoe UI', -apple-system, sans-serif;
        font-size: 11px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      /* FL-style scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #333; }
      ::-webkit-scrollbar-thumb { background: #555; border: 2px solid #333; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #666; }
      ::-webkit-scrollbar-corner { background: #333; }

      /* Range inputs — FL fader style */
      input[type="range"] {
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: linear-gradient(180deg, #333, #3A3A3A);
        border: 1px solid rgba(0,0,0,0.4);
        border-radius: 2px;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 12px;
        height: 20px;
        background: linear-gradient(180deg, #888, #666);
        border: 1px solid #555;
        border-radius: 2px;
        cursor: grab;
      }

      /* Button base */
      button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        cursor: pointer;
        outline: none;
        background: none;
      }
      button:active { opacity: 0.85; }

      /* Spin animation for update modal */
      @keyframes hw-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
