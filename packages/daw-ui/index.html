<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardwave DAW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #191919;
        color: #A0A0A0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 11px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      /* FL-style thin scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #161616; }
      ::-webkit-scrollbar-thumb { background: #3A3A3A; border: 2px solid #161616; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #4A4A4A; }
      ::-webkit-scrollbar-corner { background: #161616; }

      /* Range inputs — FL fader style */
      input[type="range"] {
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: linear-gradient(180deg, #1A1A1A, #222);
        border: 1px solid #333;
        border-radius: 1px;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 8px;
        height: 16px;
        background: linear-gradient(180deg, #888, #555);
        border: 1px solid #666;
        border-radius: 1px;
        cursor: grab;
      }

      /* Button resets */
      button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        cursor: pointer;
        outline: none;
        background: none;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
