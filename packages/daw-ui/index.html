<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardwave DAW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #2A2A2A;
        color: #C8C8C8;
        font-family: 'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif;
        font-size: 11px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      /* FL Studio scrollbar style */
      ::-webkit-scrollbar { width: 12px; height: 12px; }
      ::-webkit-scrollbar-track { background: #1A1A1A; }
      ::-webkit-scrollbar-thumb { background: #4A4A4A; border: 2px solid #1A1A1A; border-radius: 6px; }
      ::-webkit-scrollbar-thumb:hover { background: #5A5A5A; }
      ::-webkit-scrollbar-corner { background: #1A1A1A; }

      /* FL-style range inputs */
      input[type="range"] {
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: #1A1A1A;
        border: 1px solid #444;
        border-radius: 2px;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 10px;
        height: 20px;
        background: linear-gradient(180deg, #6A6A6A, #4A4A4A);
        border: 1px solid #777;
        border-radius: 2px;
        cursor: grab;
      }

      /* Button resets */
      button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        cursor: pointer;
        outline: none;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
