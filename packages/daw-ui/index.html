<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardwave DAW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #1E1E22;
        color: #B0B0B8;
        font-family: 'Segoe UI', -apple-system, sans-serif;
        font-size: 11px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      /* Thin scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #18181C; }
      ::-webkit-scrollbar-thumb { background: #3A3A40; border: 2px solid #18181C; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #4A4A50; }
      ::-webkit-scrollbar-corner { background: #18181C; }

      /* Range inputs */
      input[type="range"] {
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: linear-gradient(180deg, #1A1A1E, #222226);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 2px;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 10px;
        height: 18px;
        background: linear-gradient(180deg, #8A8A90, #5A5A60);
        border: 1px solid #6A6A70;
        border-radius: 2px;
        cursor: grab;
      }

      /* Button base */
      button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        cursor: pointer;
        outline: none;
        background: none;
      }
      button:active { opacity: 0.85; }

      /* Spin animation for update modal */
      @keyframes hw-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
