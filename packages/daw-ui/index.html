<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardwave DAW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #08080c;
        color: #d4d4d8;
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 11px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      /* Suite-style scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; background: #040406; }
      ::-webkit-scrollbar-track { background: #040406; }
      ::-webkit-scrollbar-thumb { background: #1a1a22; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #DC2626; }
      ::-webkit-scrollbar-corner { background: #040406; }

      /* Range inputs — minimal glass style */
      input[type="range"] {
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.04);
        border-radius: 6px;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 12px;
        height: 20px;
        background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.08));
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 4px;
        cursor: grab;
      }

      /* Button base */
      button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        cursor: pointer;
        outline: none;
        background: none;
      }
      button:active { opacity: 0.85; }

      /* Animations */
      @keyframes hw-spin { to { transform: rotate(360deg); } }

      /* Red glow utility */
      .glow-red {
        box-shadow: 0 0 40px rgba(220, 38, 38, 0.08), 0 0 80px rgba(220, 38, 38, 0.04);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
