name: Frontend Publish

# Builds the React frontend, packages it as a versioned zip, computes the
# manifest, and rsyncs both to /var/www/hardwave-app/daw/frontend/ on the
# vst-web cluster (vst-web01 → web02/web03 via the existing nginx-config
# distribution path). The DAW's FrontendUpdater then picks up the new
# manifest on the next launch.
#
# This is the deploy half of the splash-driven hot-swap. See:
#   - src-tauri/src/frontend_updater.rs    (client side)
#   - https://suite.hardwavestudios.com/frontend-updater-mockup/   (proposal)
#
# Triggers:
#   - Push of a tag matching `fe-v*` (e.g. fe-v0.157.29) — production publish
#   - workflow_dispatch — manual publish from any branch (e.g. for staging)
#
# Required GitHub secrets:
#   - VST_WEB01_HOST              host (e.g. 178.104.2.34) of the bundle target
#   - VST_WEB01_SSH_KEY           private OpenSSH key authorised to write
#                                 /var/www/hardwave-app/daw/frontend/ on the
#                                 cluster's golden node
#   - VST_WEB01_KNOWN_HOSTS       output of `ssh-keyscan -H <host>` for the
#                                 same host, to avoid TOFU prompts
#
# What gets published:
#   /daw/frontend/bundles/<version>.zip   — gzipped dist/ tree, immutable
#   /daw/frontend/manifest.json           — mutable; updated atomically last

on:
  push:
    tags:
      - 'fe-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Frontend version (e.g. 0.157.29). Required when run manually.'
        required: true
      requires_api:
        description: 'Semver range the running Rust core must satisfy (e.g. ^0.157)'
        required: false
        default: '*'

concurrency:
  group: frontend-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CI invariant #3 — workspace Cargo.toml version MUST match
      # src-tauri/tauri.conf.json's version. The Rust binary reports
      # `env!("CARGO_PKG_VERSION")` as `API_VERSION` to the resolver
      # (frontend_updater.rs:43); if the workspace version drifts below
      # the manifest's `min_installer`, every fresh manifest publish
      # silently DOSes hot-swap by routing all clients to the installer
      # modal. This step blocks the publish before that can happen.
      - name: Assert workspace version matches tauri.conf.json
        run: |
          set -euo pipefail
          CONF_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          # Pull the [workspace.package] version block. cargo metadata is
          # too heavy here (would pull every dep); awk on the workspace
          # manifest is sufficient and avoids a Rust toolchain install.
          WS_VERSION=$(awk '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/ && in_section { in_section = 0 }
            in_section && /^version[[:space:]]*=[[:space:]]*"[^"]+"/ {
              match($0, /"[^"]+"/)
              v = substr($0, RSTART + 1, RLENGTH - 2)
              print v
              exit
            }
          ' Cargo.toml)
          if [ -z "$WS_VERSION" ] || [ -z "$CONF_VERSION" ]; then
            echo "::error::could not parse workspace ($WS_VERSION) or tauri.conf.json ($CONF_VERSION) version"
            exit 1
          fi
          if [ "$WS_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::workspace Cargo.toml version ($WS_VERSION) != tauri.conf.json version ($CONF_VERSION) — release script must bump both. The Rust binary reports the workspace version as API_VERSION; drift disables hot-swap for every running binary."
            exit 1
          fi
          echo "Workspace version $WS_VERSION matches tauri.conf.json — OK"

      - name: Resolve version + requires_api
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag form: fe-vX.Y.Z
            VERSION="${GITHUB_REF_NAME#fe-v}"
            REQ="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" | grep -oE '^requires_api: ?.*$' | head -1 | sed 's/^requires_api:\s*//' || true)"
            REQ="${REQ:-*}"
          else
            VERSION="${{ inputs.version }}"
            REQ="${{ inputs.requires_api }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::could not resolve version"
            exit 1
          fi
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "requires_api=$REQ"         >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION requires_api=$REQ"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/daw-ui/package-lock.json

      - name: Build frontend
        run: |
          cd packages/daw-ui
          npm ci
          npm run build

      - name: Package bundle
        id: pack
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          OUT="bundle.zip"
          # The custom URI scheme handler (frontend_updater.rs) reads files
          # directly from <cache>/<version>/, so the zip must be flat — no
          # leading dist/ directory.
          ( cd packages/daw-ui/dist && zip -qr "$GITHUB_WORKSPACE/$OUT" . )

          SHA=$(sha256sum "$OUT" | awk '{print $1}')
          SIZE=$(stat -c %s "$OUT")
          echo "sha256=$SHA"   >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"    >> "$GITHUB_OUTPUT"
          echo "name=$VERSION.zip" >> "$GITHUB_OUTPUT"

          # Stable name for the upload step
          mv "$OUT" "$VERSION.zip"
          ls -l "$VERSION.zip"

      - name: Build manifest.json
        id: manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          REQ="${{ steps.meta.outputs.requires_api }}"
          SHA="${{ steps.pack.outputs.sha256 }}"
          SIZE="${{ steps.pack.outputs.size }}"
          PUBLISHED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUNDLE_URL="https://suite.hardwavestudios.com/daw/frontend/bundles/${VERSION}.zip"

          # Pull bullets from the tag annotation if there is one, otherwise
          # use the latest commit subject as a single-entry changelog.
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGELOG=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" \
              | grep -E '^\s*[-*]' \
              | sed 's/^\s*[-*]\s*//' \
              | jq -R . | jq -s .)
          fi
          if [ -z "${CHANGELOG:-}" ] || [ "$CHANGELOG" = "[]" ]; then
            CHANGELOG=$(git log -1 --pretty=format:%s | jq -R . | jq -s .)
          fi

          # Version-contract fields: source-of-truth lives at
          # packages/daw-ui/version-contract.json. Tag/dispatch input wins
          # for `requires_api` so a hotfix can still tighten the range
          # without editing the file, but every other field comes from
          # the contract JSON. Absent file → schema-1 manifest, no
          # min_installer floor (legacy compatible).
          CONTRACT_PATH="packages/daw-ui/version-contract.json"
          if [ -f "$CONTRACT_PATH" ]; then
            MIN_INSTALLER=$(jq -r '.min_installer // empty' "$CONTRACT_PATH")
            CONTRACT_REQ=$(jq -r '.requires_api // empty' "$CONTRACT_PATH")
            SCHEMA=$(jq -r '.manifest_schema // 1' "$CONTRACT_PATH")
            TRACK=$(jq -r '.installer_track // "stable"' "$CONTRACT_PATH")
            HINT_JSON=$(jq -c '.installer_hint // null' "$CONTRACT_PATH")
            # If the workflow caller didn't override, fall back to the
            # contract's `requires_api`. Wildcard `"*"` is treated as
            # "no override supplied".
            if [ -z "$REQ" ] || [ "$REQ" = "*" ]; then
              if [ -n "$CONTRACT_REQ" ]; then
                REQ="$CONTRACT_REQ"
              fi
            fi
          else
            MIN_INSTALLER=""
            SCHEMA="1"
            TRACK="stable"
            HINT_JSON="null"
          fi

          # CI invariant #1 (§4 of the architecture spec): the
          # `requires_api` lower bound must be >= `min_installer`. This
          # is the load-bearing protection for pre-resolver clients —
          # they fail the range check and silently fall back to bundled
          # rather than apply a bundle their binary can't host.
          # Implemented in bash with `sort -V` so we don't depend on a
          # specific Python interpreter being available on the runner.
          ver_lt() {
            # ver_lt A B → exits 0 iff A < B as semver
            [ "$1" = "$2" ] && return 1
            local first
            first=$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -1)
            [ "$first" = "$1" ]
          }
          pad_semver() {
            # Pad a 1- or 2-component version to a strict 3-component form
            # so `sort -V` doesn't treat `0.158` as < `0.158.0`.
            local v="$1"
            local dots="${v//[^.]/}"
            case "${#dots}" in
              0) printf '%s.0.0\n' "$v" ;;
              1) printf '%s.0\n' "$v" ;;
              *) printf '%s\n' "$v" ;;
            esac
          }
          extract_lower_bound() {
            # Mirrors the Rust resolver's `range_lower_bound` logic.
            # Always returns a strict 3-component semver so downstream
            # comparisons are unambiguous. Accepted forms:
            #   ^x.y.z / ^x.y / ^x       — caret (most common)
            #   ~x.y.z / ~x.y            — tilde, treated as caret-equivalent
            #                              for the lower-bound extraction
            #   x.y.z / x.y              — bare version, treated as floor
            #   >=x.y.z[, <a.b.c]        — explicit lower bound
            #   >x.y.z[, <a.b.c]         — same lower bound (resolver rejects
            #                              the equal case via api_compatible)
            local r="$1"
            r="${r## }"
            r="${r%% }"
            if [ -z "$r" ] || [ "$r" = "*" ]; then
              return 1
            fi
            case "$r" in
              ^*)
                local v="${r#^}"
                v="${v## }"
                pad_semver "$v"
                return 0
                ;;
              \~*)
                local v="${r#\~}"
                v="${v## }"
                pad_semver "$v"
                return 0
                ;;
            esac
            local part
            local IFS=','
            for part in $r; do
              part="${part## }"
              part="${part%% }"
              case "$part" in
                '>='*)
                  local v="${part#>=}"
                  v="${v## }"
                  pad_semver "$v"
                  return 0
                  ;;
                '>'*)
                  local v="${part#>}"
                  v="${v## }"
                  pad_semver "$v"
                  return 0
                  ;;
              esac
            done
            # Bare `x.y[.z]` — treat the whole string as the floor. This
            # matches how a manifest-author would write a "minimum API"
            # without thinking about caret syntax.
            case "$r" in
              [0-9]*)
                pad_semver "$r"
                return 0
                ;;
            esac
            return 1
          }

          if [ -n "$MIN_INSTALLER" ]; then
            FLOOR_PADDED=$(pad_semver "$MIN_INSTALLER")
            if LOWER=$(extract_lower_bound "$REQ"); then
              if ver_lt "$LOWER" "$FLOOR_PADDED"; then
                echo "::error::CI invariant violated: requires_api lower bound $LOWER is below min_installer $MIN_INSTALLER"
                exit 1
              fi
              echo "requires_api lower bound $LOWER >= min_installer $MIN_INSTALLER OK"
            else
              echo "::error::cannot extract lower bound from requires_api='$REQ'. Accepted forms: '^x.y.z', '^x.y', '^x', '~x.y.z', '~x.y', 'x.y.z', 'x.y', '>=x.y.z, <a.b.c', '>x.y.z, <a.b.c'."
              exit 1
            fi
          fi

          # CI invariant #2: min_installer monotonicity. Best-effort —
          # only enforced when the previously-published manifest is
          # reachable. A fresh first-publish run skips this gracefully.
          if [ -n "$MIN_INSTALLER" ]; then
            PREV_FLOOR=$(curl -fsSL --max-time 5 \
              "https://suite.hardwavestudios.com/daw/frontend/manifest.json" 2>/dev/null \
              | jq -r '.min_installer // empty' || true)
            if [ -n "$PREV_FLOOR" ]; then
              CUR_PADDED=$(pad_semver "$MIN_INSTALLER")
              PREV_PADDED=$(pad_semver "$PREV_FLOOR")
              if ver_lt "$CUR_PADDED" "$PREV_PADDED"; then
                echo "::error::CI invariant violated: min_installer regressed ($PREV_FLOOR -> $MIN_INSTALLER)"
                exit 1
              fi
              echo "min_installer monotonicity OK ($PREV_FLOOR -> $MIN_INSTALLER)"
            else
              echo "Previous manifest had no min_installer; monotonicity check skipped"
            fi
          fi

          # Build the manifest. Optional fields are only included when set,
          # so legacy clients that strict-key on shape stay happy.
          jq -n \
            --arg version "$VERSION" \
            --arg published "$PUBLISHED" \
            --arg requires_api "$REQ" \
            --arg url "$BUNDLE_URL" \
            --argjson size "$SIZE" \
            --arg sha "$SHA" \
            --argjson changelog "$CHANGELOG" \
            --arg min_installer "$MIN_INSTALLER" \
            --argjson manifest_schema "$SCHEMA" \
            --arg installer_track "$TRACK" \
            --argjson installer_hint "$HINT_JSON" \
            '{
              manifest_schema: $manifest_schema,
              latest_version: $version,
              published_at: $published,
              requires_api: $requires_api,
              installer_track: $installer_track,
              bundle: {
                url: $url,
                size_bytes: $size,
                sha256: $sha
              },
              changelog: $changelog
            }
            + (if $min_installer == "" then {} else { min_installer: $min_installer } end)
            + (if $installer_hint == null then {} else { installer_hint: $installer_hint } end)
            ' > manifest.json

          echo "Manifest:"
          cat manifest.json

      - name: Upload artifacts (visible on the run page)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-publish-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.meta.outputs.version }}.zip
            manifest.json
          retention-days: 30
          if-no-files-found: error

      - name: Configure SSH for cluster deploy
        if: env.DEPLOY_SECRETS_PRESENT == 'true'
        env:
          DEPLOY_SECRETS_PRESENT: ${{ secrets.VST_WEB01_SSH_KEY != '' && secrets.VST_WEB01_HOST != '' }}
          SSH_PRIVATE_KEY: ${{ secrets.VST_WEB01_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VST_WEB01_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_publish
          chmod 600 ~/.ssh/id_publish
          if [ -n "$KNOWN_HOSTS" ]; then
            echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.VST_WEB01_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Push bundle + manifest atomically
        if: env.DEPLOY_SECRETS_PRESENT == 'true'
        env:
          DEPLOY_SECRETS_PRESENT: ${{ secrets.VST_WEB01_SSH_KEY != '' && secrets.VST_WEB01_HOST != '' }}
          HOST: ${{ secrets.VST_WEB01_HOST }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          REMOTE_DIR=/var/www/hardwave-app/daw/frontend
          # Bundle first (immutable; safe to upload before the manifest points at it).
          scp -i ~/.ssh/id_publish -o BatchMode=yes \
            "${VERSION}.zip" \
            "root@${HOST}:${REMOTE_DIR}/bundles/${VERSION}.zip"

          # Manifest as a separate temp upload, then atomic rename so a
          # client never sees a partially-written manifest.
          scp -i ~/.ssh/id_publish -o BatchMode=yes \
            manifest.json \
            "root@${HOST}:${REMOTE_DIR}/manifest.json.tmp"
          ssh -i ~/.ssh/id_publish -o BatchMode=yes "root@${HOST}" \
            "mv ${REMOTE_DIR}/manifest.json.tmp ${REMOTE_DIR}/manifest.json"

          echo "Published frontend ${VERSION}"
          echo "Manifest URL: https://suite.hardwavestudios.com/daw/frontend/manifest.json"
          echo "Bundle URL:   https://suite.hardwavestudios.com/daw/frontend/bundles/${VERSION}.zip"

      - name: Sync to web02 + web03 from web01
        if: env.DEPLOY_SECRETS_PRESENT == 'true'
        env:
          DEPLOY_SECRETS_PRESENT: ${{ secrets.VST_WEB01_SSH_KEY != '' && secrets.VST_WEB01_HOST != '' }}
          HOST: ${{ secrets.VST_WEB01_HOST }}
        run: |
          set -euo pipefail
          # vst-web01 already has SSH credentials for web02/web03 (per
          # /opt/vst-webviews/scripts/deploy.sh) — let it fan out.
          ssh -i ~/.ssh/id_publish -o BatchMode=yes "root@${HOST}" \
            "/opt/vst-webviews/scripts/deploy-frontend-bundle.sh ${VERSION}"

      - name: Note when secrets are absent
        if: env.DEPLOY_SECRETS_PRESENT != 'true'
        env:
          DEPLOY_SECRETS_PRESENT: ${{ secrets.VST_WEB01_SSH_KEY != '' && secrets.VST_WEB01_HOST != '' }}
        run: |
          echo "::warning::VST_WEB01_SSH_KEY / VST_WEB01_HOST not configured — bundle and manifest are uploaded as run artifacts only. Configure the secrets to enable cluster deploy."
