name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/daw-ui/package-lock.json

      - name: Build frontend
        run: |
          cd packages/daw-ui
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/daw-ui/dist
          retention-days: 1

  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from tag annotation
        id: changelog
        run: |
          # Get the annotated tag message (set by release.sh)
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ] || [ "$TAG_MSG" = "${{ github.ref_name }}" ]; then
            # Fallback: generate from commits since previous tag
            PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              TAG_MSG=$(git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges | grep -v "^- Release\|^- v[0-9]" || echo "- Bug fixes and improvements")
            else
              TAG_MSG="- Bug fixes and improvements"
            fi
            TAG_MSG="## Changes"$'\n'"${TAG_MSG}"
          fi
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

  build:
    needs: [frontend, changelog]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/daw-ui/dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Configure sccache
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "sccache available"
          else
            echo "sccache unavailable, building without cache"
          fi
        shell: bash

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libjack-jackd2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            mold clang
          # Cuts Rust link time roughly in half (mostly noticeable on the final
          # binary link). clang invokes mold via -fuse-ld=mold.
          echo "RUSTFLAGS=-C linker=clang -C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"

      - name: Fetch ASIO SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Steinberg ASIO SDK is redistributable under the developer agreement.
          # cpal's asio feature expects CPAL_ASIO_DIR to point at the extracted SDK.
          $url = 'https://www.steinberg.net/asiosdk'
          $dest = "$env:RUNNER_TEMP\asiosdk.zip"
          $out  = "$env:RUNNER_TEMP\asiosdk"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Expand-Archive -Path $dest -DestinationPath $out -Force
          $sdkRoot = Get-ChildItem -Path $out -Directory | Select-Object -First 1
          echo "CPAL_ASIO_DIR=$($sdkRoot.FullName)" >> $env:GITHUB_ENV
          echo "Extracted ASIO SDK to $($sdkRoot.FullName)"

      - name: Install LLVM (Windows — required for cpal/asio bindgen)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # windows-latest GitHub runners ship with LLVM pre-installed. Point
          # bindgen at it rather than re-installing (choco refuses to downgrade).
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$llvmBin\libclang.dll")) {
            Write-Host "LLVM not found at $llvmBin — installing via choco"
            choco install llvm -y --no-progress --force
          } else {
            Write-Host "LLVM already present at $llvmBin"
          }
          echo "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app (Linux — with JACK)
        if: matrix.platform == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hardwave DAW ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: true
          tauriScript: tauri
          args: --target ${{ matrix.target }} --features jack

      - name: Build Tauri app (Windows — with ASIO)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CPAL_ASIO_DIR: ${{ env.CPAL_ASIO_DIR }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hardwave DAW ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: true
          tauriScript: tauri
          args: --target ${{ matrix.target }} --features asio

      # Custom branded launcher-style installer (the small Tauri app
      # under `installer/`). Built with --no-bundle so we get the raw
      # executable instead of yet another NSIS wrap; a separate rename
      # step labels it "HardwaveDAW-Setup.exe" so the GitHub release
      # asset list reads cleanly. The launcher downloads the main DAW
      # NSIS .exe at install time and runs it silently — the user only
      # ever interacts with the branded GUI.
      - name: Build Hardwave DAW launcher installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        working-directory: installer
        run: |
          npm install
          npm run tauri:build -- --no-bundle

      - name: Stage HardwaveDAW-Setup.exe
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $installerExe = Get-ChildItem -Path installer/src-tauri/target/release -Filter "hardwave-daw-installer.exe" -File | Select-Object -First 1
          if (-not $installerExe) { throw "hardwave-daw-installer.exe not found" }
          Copy-Item $installerExe.FullName "HardwaveDAW-Setup.exe"
          Get-Item HardwaveDAW-Setup.exe | Select-Object Name,Length

      - name: Upload HardwaveDAW-Setup.exe to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: |
            HardwaveDAW-Setup.exe

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hardwave DAW ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: true
          tauriScript: tauri
          args: --target ${{ matrix.target }}

  discord-changelog:
    needs: [build]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post Discord changelog
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Read bullets from the annotated tag and group by prefix.
          RAW=$(git tag -l --format='%(contents)' "$VERSION" 2>/dev/null \
            | grep '^\s*[-*]' \
            | sed 's/^\s*[-*]\s*//')

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""
          TOTAL=0

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            TOTAL=$((TOTAL + 1))
            case "$line" in
              feat:*|feature:*|add:*|new:*)
                FEATURES="${FEATURES}• ${line#*: }"$'\n' ;;
              fix:*|bug:*|bugfix:*)
                FIXES="${FIXES}• ${line#*: }"$'\n' ;;
              improve:*|perf:*|refactor:*|ui:*|ux:*|chore:*)
                IMPROVEMENTS="${IMPROVEMENTS}• ${line#*: }"$'\n' ;;
              *)
                IMPROVEMENTS="${IMPROVEMENTS}• ${line}"$'\n' ;;
            esac
          done <<< "$RAW"

          # Build the fields array dynamically so empty categories are dropped.
          FIELDS=$(jq -n \
            --arg features "$(echo -n "$FEATURES" | sed -e 's/[[:space:]]*$//')" \
            --arg fixes "$(echo -n "$FIXES" | sed -e 's/[[:space:]]*$//')" \
            --arg improvements "$(echo -n "$IMPROVEMENTS" | sed -e 's/[[:space:]]*$//')" \
            '[
              (if $features != "" then {"name": "New features", "value": $features, "inline": false} else empty end),
              (if $fixes != "" then {"name": "Bug fixes", "value": $fixes, "inline": false} else empty end),
              (if $improvements != "" then {"name": "Improvements", "value": $improvements, "inline": false} else empty end)
            ]')

          if [ "$(echo "$FIELDS" | jq 'length')" = "0" ]; then
            FIELDS='[{"name": "Improvements", "value": "• Internal maintenance and stability updates", "inline": false}]'
            TOTAL=1
          fi

          NOUN="changes"
          [ "$TOTAL" = "1" ] && NOUN="change"

          PAYLOAD=$(jq -n \
            --arg title "Hardwave DAW ${VERSION}" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}" \
            --argjson fields "$FIELDS" \
            --arg footer "Release ${VERSION} · ${TOTAL} ${NOUN}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              "embeds": [{
                "title": $title,
                "url": $url,
                "color": 15228416,
                "fields": $fields,
                "footer": {
                  "text": $footer
                },
                "timestamp": $timestamp
              }]
            }')

          curl -s -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

          echo "Discord changelog posted for ${VERSION}"
