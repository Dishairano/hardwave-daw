name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/daw-ui/package-lock.json

      - name: Build frontend
        run: |
          cd packages/daw-ui
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/daw-ui/dist
          retention-days: 1

  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from tag annotation
        id: changelog
        run: |
          # Get the annotated tag message (set by release.sh)
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ] || [ "$TAG_MSG" = "${{ github.ref_name }}" ]; then
            # Fallback: generate from commits since previous tag
            PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              TAG_MSG=$(git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges | grep -v "^- Release\|^- v[0-9]" || echo "- Bug fixes and improvements")
            else
              TAG_MSG="- Bug fixes and improvements"
            fi
            TAG_MSG="## Changes"$'\n'"${TAG_MSG}"
          fi
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

  build:
    needs: [frontend, changelog]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/daw-ui/dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        shell: bash

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hardwave DAW ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: true
          tauriScript: tauri
          args: --target ${{ matrix.target }}

  discord-changelog:
    needs: [build, changelog]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Post Discord changelog
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ github.ref_name }}
          RELEASE_BODY: ${{ needs.changelog.outputs.body }}
        run: |
          # Extract bullet points from the changelog body
          CHANGES=$(echo "$RELEASE_BODY" | grep '^\s*[-*]' | sed 's/^\s*[-*]\s*/• /' | head -15)

          if [ -z "$CHANGES" ]; then
            CHANGES="• Bug fixes and improvements"
          fi

          CHANGE_COUNT=$(echo "$CHANGES" | grep -c '.' 2>/dev/null || echo 0)

          PAYLOAD=$(jq -n \
            --arg title "Hardwave DAW ${VERSION}" \
            --arg changes "$CHANGES" \
            --arg footer "Release ${VERSION} · ${CHANGE_COUNT} changes" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              "embeds": [{
                "title": $title,
                "color": 15228416,
                "fields": [
                  {"name": "Changes", "value": $changes, "inline": false}
                ],
                "footer": {
                  "text": $footer
                },
                "timestamp": $timestamp
              }]
            }')

          curl -s -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

          echo "Discord changelog posted for ${VERSION}"
