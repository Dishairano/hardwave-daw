name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/daw-ui/package-lock.json

      - name: Build frontend
        run: |
          cd packages/daw-ui
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/daw-ui/dist
          retention-days: 1

  build:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/daw-ui/dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        shell: bash

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hardwave DAW ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false
          tauriScript: tauri
          args: --target ${{ matrix.target }}

  discord-changelog:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view "${{ github.ref_name }}" --json body -q '.body' 2>/dev/null || echo "")
          echo "body<<RELEASE_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "RELEASE_EOF" >> "$GITHUB_OUTPUT"

      - name: Post Discord changelog
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ github.ref_name }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
        run: |
          parse_section() {
            local section="$1"
            local body="$2"
            echo "$body" | sed -n "/^## *${section}/,/^## /p" | grep '^\s*[-*]' | sed 's/^\s*[-*]\s*//' | head -8
          }

          NEW=$(parse_section "New" "$RELEASE_BODY")
          IMPROVED=$(parse_section "Improved" "$RELEASE_BODY")
          FIXED=$(parse_section "Fixed" "$RELEASE_BODY")

          NEW_COUNT=$(echo "$NEW" | grep -c '.' 2>/dev/null || echo 0)
          IMPROVED_COUNT=$(echo "$IMPROVED" | grep -c '.' 2>/dev/null || echo 0)
          FIXED_COUNT=$(echo "$FIXED" | grep -c '.' 2>/dev/null || echo 0)

          FIELDS="[]"

          if [ -n "$NEW" ] && [ "$NEW_COUNT" -gt 0 ]; then
            NEW_FMT=$(echo "$NEW" | sed 's/^/• /' | tr '\n' '\n')
            FIELDS=$(echo "$FIELDS" | jq --arg v "$NEW_FMT" '. + [{"name": "✦ NEW", "value": $v, "inline": false}]')
          fi

          if [ -n "$IMPROVED" ] && [ "$IMPROVED_COUNT" -gt 0 ]; then
            IMP_FMT=$(echo "$IMPROVED" | sed 's/^/• /' | tr '\n' '\n')
            FIELDS=$(echo "$FIELDS" | jq --arg v "$IMP_FMT" '. + [{"name": "✦ IMPROVED", "value": $v, "inline": false}]')
          fi

          if [ -n "$FIXED" ] && [ "$FIXED_COUNT" -gt 0 ]; then
            FIX_FMT=$(echo "$FIXED" | sed 's/^/• /' | tr '\n' '\n')
            FIELDS=$(echo "$FIELDS" | jq --arg v "$FIX_FMT" '. + [{"name": "✦ FIXED", "value": $v, "inline": false}]')
          fi

          if [ "$(echo "$FIELDS" | jq 'length')" -eq 0 ]; then
            FALLBACK="${RELEASE_BODY:-Bug fixes and improvements.}"
            FIELDS=$(echo '[]' | jq --arg v "$FALLBACK" '. + [{"name": "Changes", "value": $v, "inline": false}]')
          fi

          SUMMARY=""
          [ "$NEW_COUNT" -gt 0 ] && SUMMARY="${NEW_COUNT} new"
          [ "$IMPROVED_COUNT" -gt 0 ] && SUMMARY="${SUMMARY:+$SUMMARY · }${IMPROVED_COUNT} improved"
          [ "$FIXED_COUNT" -gt 0 ] && SUMMARY="${SUMMARY:+$SUMMARY · }${FIXED_COUNT} fixed"

          PAYLOAD=$(jq -n \
            --arg title "Hardwave DAW ${VERSION}" \
            --arg footer "${SUMMARY:-Release ${VERSION}}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson fields "$FIELDS" \
            '{
              "embeds": [{
                "title": $title,
                "color": 15228416,
                "fields": $fields,
                "footer": {
                  "text": ("Download at hardwavestudios.com/daw  •  " + $footer)
                },
                "timestamp": $timestamp
              }]
            }')

          curl -s -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

          echo "Discord changelog posted for ${VERSION}"
