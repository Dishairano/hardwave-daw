name: Release · Windows · self-hosted
# Per-run display label so the Actions list distinguishes this side-by-side
# build from the official `Release` matrix that runs on GitHub-hosted
# runners. Compare wall-clock times between the two to see how much the
# self-hosted runner saves us.
run-name: Release self-hosted · Windows · ${{ github.ref_name }}

# Trigger on the SAME tags as the production release.yml so we get a
# direct side-by-side comparison every release. The self-hosted run does
# NOT upload to GitHub Releases — that's still the responsibility of
# release.yml on github-hosted Windows. This workflow exists purely to
# measure throughput and to act as a fallback runner if GitHub's hosted
# capacity is congested.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_ref:
        description: 'Tag or ref to build (defaults to current HEAD when manual)'
        required: false

# Security note: workflow only triggers on tag pushes (which require write
# access) and manual workflow_dispatch (which requires the actor have
# Actions write access). Pull-requests from forks deliberately cannot
# trigger this — the self-hosted runner must never execute untrusted code.
permissions:
  contents: read

jobs:
  build-windows:
    name: Windows installer (self-hosted)
    # Targets DESKTOP-R3EHHM9 specifically via the `hardwave-daw` label so
    # other repos sharing the runner pool (if any) can't poach this job.
    runs-on: [self-hosted, Windows, hardwave-daw]

    # Same cargo/network hygiene as release.yml — keeps both pipelines
    # behaving identically apart from the runner.
    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      # NOTE: the runner service runs as NT AUTHORITY\NETWORK SERVICE
      # which means anything user-scoped (per-user Rust, per-user Node,
      # nvm-windows in %APPDATA%) is invisible here. Use the actions/*
      # setup tasks that drop tools in the runner's tool cache, which the
      # service account can read.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/daw-ui/package-lock.json

      - name: Build frontend
        shell: bash
        run: |
          cd packages/daw-ui
          npm ci
          npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # Different key from release.yml so the self-hosted cache lives
          # alongside the github-hosted cache without colliding. Stays on
          # disk between runs since the service persists.
          workspaces: src-tauri -> target
          shared-key: self-hosted-windows
          cache-on-failure: true

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Configure sccache
        shell: bash
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "sccache available"
          else
            echo "sccache unavailable, building without"
          fi

      - name: Fetch ASIO SDK
        shell: pwsh
        run: |
          # If a system-wide CPAL_ASIO_DIR is already set on the PC, skip
          # the download. Otherwise grab a fresh copy into the runner
          # work-tree so we don't litter C:\Users\* (which the service
          # account can't read anyway).
          if ($env:CPAL_ASIO_DIR -and (Test-Path $env:CPAL_ASIO_DIR)) {
            Write-Host "Using pre-installed ASIO SDK at $env:CPAL_ASIO_DIR"
          } else {
            $url = 'https://www.steinberg.net/asiosdk'
            $dest = "$env:RUNNER_TEMP\asiosdk.zip"
            $out  = "$env:RUNNER_TEMP\asiosdk"
            Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
            Expand-Archive -Path $dest -DestinationPath $out -Force
            $sdkRoot = Get-ChildItem -Path $out -Directory | Select-Object -First 1
            "CPAL_ASIO_DIR=$($sdkRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ASCII
          }

      - name: Resolve LLVM (libclang + lld-link)
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$llvmBin\libclang.dll")) {
            Write-Host "LLVM not found at $llvmBin — installing machine-wide via choco"
            choco install llvm -y --no-progress --force
          } else {
            Write-Host "LLVM already present at $llvmBin"
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ASCII
          "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding ASCII
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=lld-link.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ASCII

      - name: Install Tauri CLI
        shell: pwsh
        run: npm install -g "@tauri-apps/cli@latest"

      - name: Build Tauri app (Windows — ASIO + lld-link)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          tauri build --target x86_64-pc-windows-msvc --features asio --bundles nsis,updater

      - name: Stage installer for artifact upload
        shell: pwsh
        run: |
          # NSIS output lives under target/<triple>/release/bundle/nsis/
          $bundleRoot = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          $stage = "$env:RUNNER_TEMP\windows-installer"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          if (Test-Path "$bundleRoot/nsis") {
            Copy-Item -Path "$bundleRoot/nsis/*" -Destination $stage -Recurse -Force
          }
          if (Test-Path "$bundleRoot/updater") {
            Copy-Item -Path "$bundleRoot/updater/*" -Destination $stage -Recurse -Force
          }
          Get-ChildItem $stage -Recurse | Select-Object FullName,Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-selfhosted-${{ github.ref_name }}
          path: ${{ runner.temp }}/windows-installer/**
          retention-days: 7
          if-no-files-found: warn

      # Print a wall-clock summary so we can quickly compare against the
      # github-hosted run in the Actions UI without opening both jobs.
      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $now = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
          $msg = @"
          # Self-hosted Windows build summary

          - Runner: DESKTOP-R3EHHM9 (label: hardwave-daw)
          - Ref: ${{ github.ref_name }}
          - Finished: $now
          - Compare against the Github-hosted run for the same tag at:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $msg
