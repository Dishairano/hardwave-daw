name: Functional Smoke
run-name: Functional Smoke · ${{ github.ref_name }}

# Runs the killer-watch tests in `crates/hardwave-engine/tests/functional_smoke.rs`.
# These tests are gated with `#[ignore]` so the default `cargo test --workspace`
# (run by `ci.yml`) keeps blocking on the PASS-required cases only.
#
# This job tracks the killers — features marked d:1 on the roadmap that the
# 2026-05-04 audit found to be vapor. When a killer-watch test flips green,
# the matching killer is genuinely fixed and the roadmap entry can move
# from VAPOR / PARTIAL to WORKING. See:
#   - hardwave-brain/wiki/concepts/Killer Reality Breaks.md
#   - hardwave-brain/wiki/concepts/D1 Live Verification.md
#
# This workflow does NOT block merges (`continue-on-error: true`). It exists
# to give visibility on which killers are still vapor.

on:
  push:
    branches:
      - master
      - redesign-port-from-master
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches:
      - master
      - redesign-port-from-master

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  killer-watch:
    name: Killer-watch (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libjack-jackd2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Configure sccache
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          fi

      - name: Run killer-watch tests
        id: tests
        continue-on-error: true
        run: |
          set +e
          cargo test \
            --test functional_smoke \
            -p hardwave-engine \
            -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee killer-watch-output.txt
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Render status board
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "  Hardwave DAW Killer-Watch Status Board"
          echo "============================================================"
          echo ""
          echo "Each test below tracks one of the 5 killer reality breaks."
          echo "GREEN means the killer is genuinely fixed and the matching"
          echo "roadmap entry can be flipped from VAPOR/PARTIAL to WORKING."
          echo ""
          # Each test name → roadmap section it covers.
          for kw in \
            "killer_midi_note_produces_sound:P5/MIDI clip → audio:engine.rs:887 filters Audio only" \
            "killer_track_insert_modifies_audio:P6/FX Insert Slots:TrackNode does not iterate inserts" \
            "killer_recording_writes_clip:P7/Audio Recording:recording.rs has zero callers" \
            "killer_automation_changes_parameter:P6/Automation Clips:Project has no automation_clips field"
          do
            name="${kw%%:*}"
            rest="${kw#*:}"
            section="${rest%%:*}"
            why="${rest#*:}"
            if grep -qE "test ${name} \.\.\. ok$" killer-watch-output.txt 2>/dev/null; then
              status="✅ FIXED"
            else
              status="❌ VAPOR"
            fi
            printf "  %-44s  %-32s  %s\n" "$name" "$status — $section" "($why)"
          done
          echo ""
          echo "Full output:"
          tail -80 killer-watch-output.txt || true

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 Killer-Watch Status\n\n';
            body += 'Tracking the 5 killer reality breaks from the 2026-05-04 audit. ';
            body += 'Each test below verifies whether one of the broken user flows now works end-to-end.\n\n';
            body += '| Killer | Status | Roadmap section |\n|---|---|---|\n';

            const cases = [
              ['killer_midi_note_produces_sound', 'MIDI clips produce sound', 'P5/MIDI'],
              ['killer_track_insert_modifies_audio', 'Track FX inserts process audio', 'P6/FX Insert Slots'],
              ['killer_recording_writes_clip', 'Audio recording writes a clip', 'P7/Audio Recording'],
              ['killer_automation_changes_parameter', 'Automation changes a parameter', 'P6/Automation Clips'],
            ];

            const output = fs.existsSync('killer-watch-output.txt')
              ? fs.readFileSync('killer-watch-output.txt', 'utf8')
              : '';

            for (const [name, label, section] of cases) {
              const passing = new RegExp(`test ${name} \\.\\.\\. ok$`, 'm').test(output);
              const status = passing ? '✅ FIXED' : '❌ VAPOR';
              body += `| ${label} | ${status} | ${section} |\n`;
            }

            body += '\n_Non-blocking job — does not gate merge. See ';
            body += '`crates/hardwave-engine/tests/functional_smoke.rs` for test bodies._';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
